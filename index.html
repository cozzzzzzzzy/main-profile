<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Saya</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      padding:20px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#111827;
    }

    .logo{
      font-size:24px;
      font-weight:bold;
      color:#38bdf8;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#38bdf8;
    }

    .hero{
      height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:20px;
      max-width:700px;
      opacity:0.8;
      margin-bottom:30px;
    }

    .btn{
      padding:14px 28px;
      background:#38bdf8;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    footer{
      text-align:center;
      padding:20px;
      background:#111827;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">COZZZZZZZY</div>

    <nav>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Website Pertama Saya</h1>

    <p>
      Website ini dibuat gratis menggunakan GitHub Pages.
      Bisa diedit bebas menggunakan HTML, CSS, dan JavaScript.
    </p>

    <a href="#" class="btn">Mulai</a>
  </section>

  <footer>
    © 2026 COZZZZZZZY
  </footer>

</body>
</html>
