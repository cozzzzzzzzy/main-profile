<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <title>Website Saya</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
    }

    header{
      padding:20px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#111827;
    }

    .logo{
      font-size:24px;
      font-weight:bold;
      color:#38bdf8;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      transition:0.3s;
    }

    nav a:hover{
      color:#38bdf8;
    }

    .hero{
      height:90vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero p{
      font-size:20px;
      max-width:700px;
      opacity:0.8;
      margin-bottom:30px;
    }

    .btn{
      padding:14px 28px;
      background:#38bdf8;
      color:black;
      text-decoration:none;
      border-radius:10px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    footer{
      text-align:center;
      padding:20px;
      background:rgba(0, 0, 0, 0.2);

     color: #d4af37;             /* Kuning tua emas */

  font-family: 'Montserrat', sans-serif; /* Mengganti font */
  font-weight: 600;           /* Membuat font agak tebal */
  letter-spacing: 0.2px;        /* Memberi jarak huruf agar elegan */
  text-transform: uppercase;    /* Kapital semua */
  font-size: 0.85rem;
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">COZZZZZZZY</div>

    <nav>
      <a href="#">About Me</a>
      <a href="#">Gallery</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Hi!<br/>Saya Aufa</h1>

    <p>
      Undergraduate Student in Mathematics Education | Tech & AI Integration Enthusiast
    </p>

    <a href="#" class="btn">About Me</a>
  </section>

  <footer>
    Salam Hangat, Muhammad Aufa Maulana Fahmi
  </footer>

</body>
</html>
